<div class="space-y-6">
  <!-- Header -->
  <div class="bg-white p-6 rounded-lg shadow">
    <h2 class="text-2xl font-bold text-gray-800 mb-2">📅 Book Appointment</h2>
    <p class="text-gray-600">Schedule your visit with our medical professionals</p>
  </div>

  <!-- Loading State -->
  <div *ngIf="loadingDoctors" class="bg-white p-12 rounded-lg shadow text-center">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
    <p class="mt-4 text-gray-600">Loading doctors...</p>
  </div>

  <!-- Booking Form -->
  <div *ngIf="!loadingDoctors" class="bg-white p-8 rounded-lg shadow">
    <form (ngSubmit)="bookAppointment()" class="space-y-6">
      
      <!-- Select Doctor -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Select Doctor <span class="text-red-500">*</span>
        </label>
        <select
          [(ngModel)]="selectedDoctorId"
          name="doctor"
          required
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        >
          <option value="0">Choose a doctor...</option>
          <option *ngFor="let doctor of doctors" [value]="doctor.id">
            Dr. {{ doctor.name }} - {{ doctor.specialization }}
          </option>
        </select>
      </div>

      <!-- Date & Time -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Appointment Date <span class="text-red-500">*</span>
          </label>
          <input
            type="date"
            [(ngModel)]="appointmentDate"
            name="date"
            [min]="minDate"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Appointment Time <span class="text-red-500">*</span>
          </label>
          <input
            type="time"
            [(ngModel)]="appointmentTime"
            name="time"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
        </div>
      </div>

      <!-- Reason -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Reason for Visit (Optional)
        </label>
        <textarea
          [(ngModel)]="reason"
          name="reason"
          rows="4"
          placeholder="Describe your symptoms or reason for visit..."
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        ></textarea>
      </div>

      <!-- Submit Button -->
      <div class="flex gap-4">
        <button
          type="submit"
          [disabled]="loading"
          class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition disabled:bg-gray-400 disabled:cursor-not-allowed"
        >
          <span *ngIf="!loading">Book Appointment</span>
          <span *ngIf="loading">Booking...</span>
        </button>

        <button
          type="button"
          (click)="router.navigate(['/patient-dashboard'])"
          class="px-6 py-3 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition"
        >
          Cancel
        </button>
      </div>
    </form>

    <!-- Info Box -->
    <div class="mt-6 p-4 bg-blue-50 border border-blue-200 rounded-lg">
      <h4 class="font-semibold text-blue-800 mb-2">📌 Important Notes:</h4>
      <ul class="text-sm text-blue-700 space-y-1">
        <li>• Please arrive 10 minutes before your appointment</li>
        <li>• Bring your medical records if available</li>
        <li>• You can cancel or reschedule up to 24 hours in advance</li>
      </ul>
    </div>
  </div>
</div>
