<div class="max-w-lg mx-auto bg-white shadow-lg rounded-xl p-8 mt-10">
  <h2 class="text-2xl font-semibold text-blue-700 mb-4 text-center">
    Invite a Doctor
  </h2>

  <p class="text-gray-500 text-center mb-6">
    Enter the doctor's email address below to send an invitation link.
  </p>

  <form (ngSubmit)="inviteDoctor()" class="space-y-4">
    <div>
      <label class="block text-gray-700 font-medium mb-1">Doctor’s Email</label>
      <input
        type="email"
        [(ngModel)]="email"
        name="email"
        placeholder="doctor@example.com"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-300"
        required
      />
    </div>

    <button
      type="submit"
      [disabled]="loading"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition-all duration-200"
    >
      {{ loading ? 'Sending...' : 'Send Invitation' }}
    </button>
  </form>
</div>
