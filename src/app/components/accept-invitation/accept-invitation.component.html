<div class="min-h-screen bg-gradient-to-br from-blue-50 to-blue-100 flex items-center justify-center p-4">
  <div class="bg-white rounded-lg shadow-xl max-w-md w-full p-8">
    
    <!-- Loading State -->
    <div *ngIf="validating" class="text-center py-8">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
      <p class="mt-4 text-gray-600">Validating invitation...</p>
    </div>

    <!-- Error State -->
    <div *ngIf="!validating && !tokenValid" class="text-center py-8">
      <div class="text-red-500 text-5xl mb-4">⚠️</div>
      <h2 class="text-2xl font-bold text-gray-800 mb-2">Invalid Invitation</h2>
      <p class="text-gray-600 mb-6">{{ errorMessage }}</p>
      <button (click)="router.navigate(['/'])" 
              class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
        Go to Home
      </button>
    </div>

    <!-- Registration Form -->
    <div *ngIf="!validating && tokenValid">
      <div class="text-center mb-6">
        <h2 class="text-3xl font-bold text-gray-800">🏥 Complete Registration</h2>
        <p class="text-gray-600 mt-2">Create your doctor account</p>
        <p class="text-sm text-blue-600 mt-1">{{ email }}</p>
      </div>

      <form (ngSubmit)="completeRegistration()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
          <input type="text" [(ngModel)]="name" name="name" required
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                 placeholder="Dr. John Doe">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Specialization</label>
          <input type="text" [(ngModel)]="specialization" name="specialization" required
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                 placeholder="Cardiology, Pediatrics, etc.">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
          <input type="tel" [(ngModel)]="phone" name="phone" required
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                 placeholder="+234 800 000 0000">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" [(ngModel)]="password" name="password" required
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                 placeholder="Minimum 6 characters">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
          <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                 placeholder="Re-enter password">
        </div>

        <button type="submit" [disabled]="loading"
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition disabled:bg-gray-400 disabled:cursor-not-allowed">
          <span *ngIf="!loading">Complete Registration</span>
          <span *ngIf="loading">Processing...</span>
        </button>
      </form>
    </div>
  </div>
</div>
